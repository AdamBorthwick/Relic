<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c1c22"/>
      <stop offset="100%" stop-color="#0e0e11"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#0e0e11"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- star sits beside "Relic", vertically centered on cap-height midpoint (y≈306) -->
  <path fill="#c6f24e" filter="url(#glow)"
        transform="translate(464 306) scale(2.4) translate(-12 -16)"
        d="M12 0 L14.8 12.4 L24 16 L14.8 19.6 L12 32 L9.2 19.6 L0 16 L9.2 12.4 Z"/>
  <text x="504" y="345" text-anchor="start" fill="#ffffff"
        font-family="'Bricolage Grotesque', system-ui, -apple-system, sans-serif"
        font-weight="700" font-size="108" letter-spacing="-1">Relic</text>
  <text x="600" y="400" text-anchor="middle" fill="rgba(255,255,255,0.38)"
        font-family="system-ui, -apple-system, sans-serif"
        font-weight="400" font-size="24" letter-spacing="1">digital collectibles</text>
</svg>
