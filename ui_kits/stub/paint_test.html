<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Paint shader test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  /* p5 appends canvas directly to body */
  body > canvas { position: fixed !important; inset: 0; width: 100% !important; height: 100% !important; }
  #controls {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  button {
    font: 13px/1 monospace; padding: 6px 14px; border: 1px solid #555;
    background: rgba(0,0,0,.65); color: #eee; cursor: pointer; border-radius: 4px;
  }
  button.active { background: rgba(255,255,255,.18); border-color: #ccc; color: #fff; }
</style>
</head>
<body>
<div id="controls">
  <button id="btn-chicot" class="active" onclick="setScene('chicot')">chicot (red/blue)</button>
  <button id="btn-canio"  onclick="setScene('canio')">canio (blue/green)</button>
  <button id="btn-aurora" onclick="setScene('aurora')">aurora (teal/violet)</button>
</div>

<script src="https://unpkg.com/p5@1.11.0/lib/p5.min.js" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script src="SceneTextures.js"></script>
<script>
var inst = null;

function buildInst(id) {
  if (inst) { inst.remove(); inst = null; }
  var def = window.STUB.SCENE_SHADERS[id];
  // Pass document.body as parent so p5 appends canvas straight to body
  inst = new p5(function(p) {
    var shad;
    p.setup = function() {
      p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
      p.pixelDensity(Math.min(window.devicePixelRatio || 1, 2));
      shad = p.createShader(window.STUB.SCENE_VERT, def.frag);
      p.noStroke();
    };
    p.draw = function() {
      p.shader(shad);
      shad.setUniform('uTime',   p.millis() / 1000.0);
      shad.setUniform('uAspect', p.width / p.height);
      shad.setUniform('uCenter', [0.5, 0.5]);
      def.setUniforms(shad, p);
      p.rectMode(p.CENTER);
      p.rect(0, 0, p.width, p.height);
    };
    p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
  }, document.body);
}

function setScene(id) {
  document.querySelectorAll('#controls button').forEach(function(b) {
    b.classList.toggle('active', b.id === 'btn-' + id);
  });
  buildInst(id);
}

// SceneTextures defers thumbnail generation (setTimeout 0) and its g.remove()
// calls clobber any canvas we create before that. Wait for stubtex:ready first.
window.addEventListener('stubtex:ready', function() { buildInst('chicot'); }, { once: true });
</script>
</body>
</html>
